<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<title>Gustavo ❤️ Giovana</title>
 
<link rel="stylesheet" href="css/style.css">
 
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap%22 rel="stylesheet">
 
</head>
 
<body>
 
<div id="hearts"></div>
 
<section class="hero">
 
    <div class="overlay"></div>
 
    <div class="hero-content">
 
        <h1>
            Gustavo ❤️ Giovana
        </h1>
 
        <p class="subtitle">
            Desde 22 de outubro de 2022
        </p>
 
        <div id="envelope" class="envelope">
 
            <div class="flap"></div>
 
            <div class="body">
 
                <span>💌</span>
 
                <p>Clique para abrir</p>
 
            </div>
 
        </div>
 
    </div>
 
</section>
 
<section id="preview" class="preview hidden">
 
    <img src="images/img1.jpg" alt="foto">
 
    <h2>Leia a carta ❤️</h2>
 
</section>
 
<section id="letterSection" class="hidden">
 
    <div class="letter">
 
        <h2>Para o amor da minha vida ❤️</h2>
 
        <p id="typingText"></p>
 
    </div>
 
</section>
 
<section class="music">
 
    <h2>Nossa música 🎵</h2>
 
    <div class="music-card">
 
        <a
        href="https://youtu.be/rTsbSY04s1Y?si=_L8DYcdCXLMtVLce"
        target="_blank">
 
        Ouvir Chuva de Arroz ❤️
 
        </a>
 
    </div>
 
</section>
 
<section class="together">
 
    <h2>Estamos juntos há...</h2>
 
    <div class="counter-grid">
 
        <div class="counter-card">
            <span id="daysTogether">0</span>
            <small>Dias</small>
        </div>
 
        <div class="counter-card">
            <span id="hoursTogether">0</span>
            <small>Horas</small>
        </div>
 
        <div class="counter-card">
            <span id="minutesTogether">0</span>
            <small>Minutos</small>
        </div>
 
    </div>
 
</section>
 
<section class="countdown">
 
    <h2>Faltam para nossos 4 anos ❤️</h2>
 
    <div class="counter-grid">
 
        <div class="counter-card">
            <span id="days">0</span>
            <small>Dias</small>
        </div>
 
        <div class="counter-card">
            <span id="hours">0</span>
            <small>Horas</small>
        </div>
 
        <div class="counter-card">
            <span id="minutes">0</span>
            <small>Minutos</small>
        </div>
 
        <div class="counter-card">
            <span id="seconds">0</span>
            <small>Segundos</small>
        </div>
 
    </div>
 
</section>
 
<section class="gallery">
 
    <h2>Nossos Momentos ❤️</h2>
 
    <div class="polaroids">
 
        <img src="images/img1.jpg">
        <img src="images/img2.jpg">
        <img src="images/img3.jpg">
        <img src="images/img4.jpg">
        <img src="images/img5.png">
        <img src="images/img6.jpg">
        <img src="images/img7.jpg">
        <img src="images/img8.jpg">
        <img src="images/img9.JPG">
        <img src="images/img10.JPG">
        <img src="images/img11.jpg">
 
    </div>
 
</section>
 
<div id="modal" class="modal">
 
    <img id="modalImg">
 
</div>
 
<script src="js/script.js"></script>
 
</body>
</html>
